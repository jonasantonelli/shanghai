<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d3557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13243d;stop-opacity:1" />
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect width="100" height="100" rx="24" fill="url(#logo-bg)" />
  
  <!-- Back Card (Hearts) -->
  <g transform="translate(30, 25) rotate(-8)" filter="url(#card-shadow)">
    <rect width="45" height="60" rx="4" fill="#f1faee" />
    <text x="4" y="10" font-family="serif" font-weight="bold" font-size="8" fill="#e63946">♥</text>
  </g>

  <!-- Front Card (Spades with S) -->
  <g transform="translate(40, 20) rotate(5)" filter="url(#card-shadow)">
    <rect width="45" height="60" rx="4" fill="#f1faee" stroke="#a8dadc" stroke-width="0.5" />
    <text x="4" y="10" font-family="serif" font-weight="bold" font-size="8" fill="#1d3557">♠</text>
    <text x="22.5" y="38" font-family="Georgia, serif" font-weight="bold" font-size="28" text-anchor="middle" fill="#1d3557">S</text>
    <text x="36" y="55" font-family="serif" font-weight="bold" font-size="8" fill="#1d3557" transform="rotate(180 38.5 53)">♠</text>
  </g>
</svg>
