<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d3557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13243d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="800" height="300" fill="url(#bg-grad)" />
  
  <!-- Subtle Grid Pattern -->
  <pattern id="dot-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#a8dadc" opacity="0.1" />
  </pattern>
  <rect width="800" height="300" fill="url(#dot-grid)" />

  <!-- Decorative Cards Fan -->
  <g transform="translate(620, 150)">
    <!-- Back Card -->
    <g transform="translate(-120, -100) rotate(-15)" filter="url(#shadow)">
      <rect width="100" height="140" rx="8" fill="#f1faee" />
      <text x="10" y="25" font-family="serif" font-weight="bold" font-size="20" fill="#e63946">A</text>
      <text x="10" y="45" font-family="serif" font-size="20" fill="#e63946">♥</text>
    </g>

    <!-- Middle Card -->
    <g transform="translate(-60, -110) rotate(-5)" filter="url(#shadow)">
      <rect width="100" height="140" rx="8" fill="#f1faee" />
      <text x="10" y="25" font-family="serif" font-weight="bold" font-size="20" fill="#1d3557">Q</text>
      <text x="10" y="45" font-family="serif" font-size="20" fill="#1d3557">♠</text>
    </g>

    <!-- Front Card -->
    <g transform="translate(0, -100) rotate(10)" filter="url(#shadow)">
      <rect width="100" height="140" rx="8" fill="#f1faee" stroke="#a8dadc" stroke-width="0.5" />
      <text x="10" y="25" font-family="serif" font-weight="bold" font-size="20" fill="#1d3557">S</text>
      <text x="10" y="45" font-family="serif" font-size="20" fill="#1d3557">♣</text>
      <text x="50" y="85" font-family="Georgia, serif" font-weight="bold" font-size="48" text-anchor="middle" fill="#1d3557" opacity="0.1">S</text>
    </g>
  </g>

  <!-- Title / Branding Accent -->
  <text x="40" y="160" font-family="Georgia, serif" font-weight="bold" font-size="82" fill="#f1faee" opacity="0.05">SHANGHAI</text>
  <text x="50" y="150" font-family="Georgia, serif" font-weight="bold" font-size="80" fill="#f1faee" filter="url(#shadow)">Shanghai</text>
  <text x="52" y="190" font-family="Arial, sans-serif" font-weight="normal" font-size="24" fill="#a8dadc" letter-spacing="4">THE ULTIMATE CARD GAME</text>

  <!-- Abstract Flare -->
  <circle cx="100" cy="50" r="150" fill="#457b9d" opacity="0.1" />
</svg>
